name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php-version }} unit tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php-version }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint sources
        run: |
          find src tests -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null
          echo "lint ok"

      - name: Unit tests
        run: composer test

  integration:
    runs-on: ubuntu-latest
    name: Integration tests (dockerized Lake server)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration tests
        run: make integration
