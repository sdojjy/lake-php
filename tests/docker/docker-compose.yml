services:
  minio:
    image: docker.io/minio/minio
    command: server /data
    volumes:
      - ./data:/data

  meta:
    image: docker.io/datafuselabs/databend-meta:${LAKE_SERVER_META_VERSION:-nightly}
    volumes:
      - ./meta.toml:/conf.toml:ro
    command: -c /conf.toml
    healthcheck:
      test: "databend-metactl status || exit 1"
      interval: 2s
      retries: 10
      start_period: 2s
      timeout: 1s

  query:
    image: docker.io/datafuselabs/databend-query:${LAKE_SERVER_QUERY_VERSION:-nightly}
    volumes:
      - ./query.toml:/conf.toml:ro
    command: -c /conf.toml
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_started
      meta:
        condition: service_healthy
    healthcheck:
      test: "curl -f localhost:8080/v1/health || exit 1"
      interval: 2s
      retries: 30
      start_period: 5s
      timeout: 1s
